name: Deploy Test Suite

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python -c "import sys; print(f'Python {sys.version}')"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test]"

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Run linting checks (optional)
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 msaexplorer/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 msaexplorer/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

  python-version-check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python -c "import sys; print(f'Python {sys.version}')"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Test library imports and basic functionality
        run: |
          python -c "
          import sys
          print(f'Testing on Python {sys.version_info.major}.{sys.version_info.minor}')
          
          # Test core imports
          from msaexplorer import explore, draw, config
          print('✓ Core imports successful')
          
          # Test that key modules exist
          assert hasattr(explore, 'MSA'), 'MSA class not found'
          assert hasattr(draw, 'alignment'), 'alignment function not found'
          assert hasattr(config, 'POSSIBLE_CHARS'), 'POSSIBLE_CHARS not found'
          print('✓ All core modules and classes accessible')
          
          # Test basic MSA creation
          aln = explore.MSA('example_alignments/DNA.fasta')
          assert len(aln.alignment) > 0, 'Alignment dictionary is empty'
          print(f'✓ Successfully loaded alignment with {len(aln.alignment)} sequences')
          
          print(f'✓ Python {sys.version_info.major}.{sys.version_info.minor} compatibility verified')
          "

