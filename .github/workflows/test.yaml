name: Tests and Python Version Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python -c "import sys; print(f'Python {sys.version}')"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test,app]"

      - name: Test library imports and basic functionality
        run: |
          python -c "
          import sys
          print(f'Testing on Python {sys.version_info.major}.{sys.version_info.minor}')

          from msaexplorer import explore, draw, config
          print('Core imports successful')

          assert hasattr(explore, 'MSA'), 'MSA class not found'
          assert hasattr(draw, 'alignment'), 'alignment function not found'
          assert hasattr(config, 'POSSIBLE_CHARS'), 'POSSIBLE_CHARS not found'
          print('All core modules and classes accessible')

          aln = explore.MSA('example_alignments/DNA.fasta')
          assert len(aln._alignment) > 0, 'Alignment dictionary is empty'
          print(f'Successfully loaded alignment with {len(aln._alignment)} sequences')
          "

      - name: Smoke test CLI app startup (msaexplorer --run)
        run: |
          msaexplorer --run --host 127.0.0.1 --port 8000 > server.log 2>&1 &
          PID=$!
          sleep 8

          if ! kill -0 "$PID" 2>/dev/null; then
            echo "Server process exited unexpectedly"
            cat server.log
            exit 1
          fi

          python - <<'PY'
          import urllib.request
          urllib.request.urlopen('http://127.0.0.1:8000', timeout=5)
          print('msaexplorer --run is reachable on http://127.0.0.1:8000')
          PY

          kill "$PID"
          wait "$PID" || true

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Run linting checks (optional)
        run: |
          pip install flake8
          flake8 msaexplorer/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 msaexplorer/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true
